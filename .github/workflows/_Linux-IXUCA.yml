name: Linux-IXUCA

on:
  workflow_call:
    inputs:
      can-skip:
        type: string
        required: false

env:
  docker_image: paddle-ixuca-py39:3.3.0
  PR_ID: ${{ github.event.pull_request.number }}
  COMMIT_ID: ${{ github.event.pull_request.head.sha }}
  ci_scripts: /paddle/ci
  ci_scripts_runner: ${{ github.workspace }}/ci
  work_dir: /paddle
  PADDLE_ROOT: /paddle
  TASK: paddle-CI-${{ github.event.pull_request.number }}-ixuca
  BRANCH: ${{ github.event.pull_request.base.ref }}
  CI_name: ixuca

jobs:
  check-bypass:
    name: Check bypass
    if: ${{ inputs.can-skip != 'true' }}
    uses: ./.github/workflows/check-bypass.yml
    with:
      workflow-name: "ixuca"
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: Build and Test
    needs: check-bypass
    if: ${{ needs.check-bypass.outputs.can-skip != 'true' }}
    runs-on:
      group: test2
    timeout-minutes: 120

    steps:
      - name: Check approval
        id: check-approval
        run: |
          set -euo pipefail

          SKIP_FLAG_FILE=/data/geyuqiang/skip-ci.txt
          PR_NUMBER="${{ github.event.pull_request.number }}"
          if [ -f "${SKIP_FLAG_FILE}" ]; then
            flag_value=$(head -n 1 "${SKIP_FLAG_FILE}" | tr -d '\r\n[:space:]')
            if [ "${flag_value}" = "true" ]; then
              second_line=$(sed -n '2p' "${SKIP_FLAG_FILE}" | tr -d '\r\n[:space:]')
              if [ -n "${second_line}" ] && [ "${second_line}" = "${PR_NUMBER}" ]; then
                echo "Skip flag is true but second line matches PR ${PR_NUMBER}; not skipping IXUCA CI"
              else
                echo "Found skip flag file ${SKIP_FLAG_FILE} with value true and PR number mismatch/empty; skipping IXUCA CI"
                echo "can-skip=true" >> "$GITHUB_OUTPUT"
                exit 0
              fi
            fi
          fi

          export https_proxy=http://oversea-website-proxy.aistudio.public:8888
          export http_proxy=http://oversea-website-proxy.aistudio.public:8888

          AUTHORIZED_REVIEWERS=("YqGe585" "yongqiangma")

          echo "Authorized reviewers: ${AUTHORIZED_REVIEWERS[*]}"
          echo "Repository: ${{ github.repository }}"
          echo "PR number: ${{ github.event.pull_request.number }}"

          response=$(curl -s \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews")

          echo "Response length: ${#response}"

          can_skip=$(python3 -c '
          import json, sys

          def debug(msg):
              print(msg, file=sys.stderr)

          debug("=== Review Check Debug Info ===")
          debug(f"Authorized reviewers: {sys.argv[1:]}")
          AUTHORIZED = set(sys.argv[1:])

          try:
              input_data = sys.stdin.read()
              debug(f"Raw input data length: {len(input_data)}")
              data = json.loads(input_data)
              debug(f"Parsed {len(data)} reviews")
          except Exception as e:
              debug(f"JSON parse error: {str(e)}")
              print("false")
              sys.exit(0)

          latest_state = {}
          debug("\n=== Review States ===")
          for r in data:
              user = r.get("user", {}).get("login")
              if not user:
                  continue
              state = r.get("state")
              latest_state[user] = state
              commit_id = r.get("commit_id") or ""
              debug(f"- {user}: {state} (commit: {commit_id[:8]})")

          debug("\n=== Final Check ===")
          for user, state in latest_state.items():
              if user in AUTHORIZED and state == "APPROVED":
                  debug(f"Found APPROVED review from authorized user: {user}")
                  print("true")
                  sys.exit(0)

          debug("No APPROVED review found from authorized users")
          print("false")
          ' "${AUTHORIZED_REVIEWERS[@]}" <<< "$response")

          echo "can-skip=$can_skip" >> "$GITHUB_OUTPUT"

          if [ "$can_skip" = "true" ]; then
            echo "Found valid approval from authorized reviewer, skipping IXUCA CI"
          else
            echo "No valid approval found, running full CI"
          fi

      - name: Download paddle.tar.gz and update test branch
        if: steps.check-approval.outputs.can-skip != 'true'
        timeout-minutes: 30
        run: |
          docker run -i --rm \
          --network host \
          -v ${{ github.workspace }}:/paddle \
          -e PR_ID \
          -e COMMIT_ID \
          -e BRANCH \
          -w /paddle $docker_image /bin/bash -c 'rm -rf * .[^.]*'
          set -e
          echo "Downloading Paddle.tar.gz"
          wget -q --tries=5 --no-proxy https://paddle-github-action.bj.bcebos.com/PR/Paddle/${PR_ID}/${COMMIT_ID}/Paddle.tar.gz --no-check-certificate
          echo "Extracting Paddle.tar.gz"
          tar --use-compress-program='pzstd' -xpf Paddle.tar.gz
          rm Paddle.tar.gz
          git config --global --add safe.directory $(pwd)/Paddle
          cd Paddle
          git remote add upstream https://github.com/PaddlePaddle/Paddle.git
          git config pull.rebase false
          git checkout test
          echo "Fetching upstream develop branch"
          git config --global --unset-all http.proxy || true
          git config --global --unset-all https.proxy || true
          export https_proxy=http://oversea-website-proxy.aistudio.public:8888
          export http_proxy=http://oversea-website-proxy.aistudio.public:8888
          git config --global http.proxy "$http_proxy"
          git config --global https.proxy "$https_proxy"
          git fetch upstream develop
          echo "Rebasing test branch onto upstream/develop"
          git rebase upstream/develop || {
            echo "Rebase failed, attempting to continue with current state"
            git rebase --abort || true
          }
          echo "Latest 5 commits after rebase:"
          git log --oneline -5

      - name: Determine the runner
        if: steps.check-approval.outputs.can-skip != 'true'
        run: |
          runner_name=`(echo $PWD|awk -F '/' '{print $3}')`
          echo $runner_name

      - name: Get PaddleCustomDevice PR number from Paddle PR description
        if: steps.check-approval.outputs.can-skip != 'true'
        id: get-pcd-pr
        run: |
          export https_proxy=http://oversea-website-proxy.aistudio.public:8888
          export http_proxy=http://oversea-website-proxy.aistudio.public:8888

          # Get Paddle PR description
          PR_BODY=$(curl -s \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}" \
            | python3 -c "import json,sys; data=json.load(sys.stdin); print(data.get('body', ''))")

          # Extract [PaddleCustomDevice PR] XXXX from description
          PCD_PR_NUM=$(echo "$PR_BODY" | grep -oP '\[PaddleCustomDevice PR\]\s*\K\d+' || echo "")

          if [ -n "$PCD_PR_NUM" ]; then
            echo "Found PaddleCustomDevice PR: $PCD_PR_NUM"
            echo "pcd_pr_num=$PCD_PR_NUM" >> "$GITHUB_OUTPUT"
          else
            echo "No PaddleCustomDevice PR found in PR description"
            echo "pcd_pr_num=" >> "$GITHUB_OUTPUT"
          fi

      - name: Clone PaddleCustomDevice repository
        if: steps.check-approval.outputs.can-skip != 'true'
        run: |
          # Clone PaddleCustomDevice
          git clone https://github.com/PaddlePaddle/PaddleCustomDevice.git
          cd PaddleCustomDevice

          # If PaddleCustomDevice PR number exists, fetch and merge it
          PCD_PR_NUM="${{ steps.get-pcd-pr.outputs.pcd_pr_num }}"
          if [ -n "$PCD_PR_NUM" ]; then
            echo "Fetching and merging PaddleCustomDevice PR #$PCD_PR_NUM"
            git fetch origin pull/$PCD_PR_NUM/head:pr-$PCD_PR_NUM
            git merge pr-$PCD_PR_NUM --no-edit
            echo "Successfully merged PaddleCustomDevice PR #$PCD_PR_NUM"
          fi

          cp -r ../Paddle .
          git add Paddle
          git commit -m "add Paddle submodule"

      - name: Check docker image and run container
        if: steps.check-approval.outputs.can-skip != 'true'
        env:
          PADDLE_VERSION: 0.0.0
          WITH_COVERAGE: "OFF"
          GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AGILE_PULL_ID: ${{ github.event.pull_request.number }}
          AGILE_REVISION: ${{ github.event.pull_request.head.sha }}
          GIT_PR_ID: ${{ github.event.pull_request.number }}
          PYTHON_VERSION: 3.9
          no_proxy: bcebos.com
          PADDLE_BRANCH: ${{ github.event.pull_request.base.ref }}

        run: |
          container_name=${TASK}-$(date +%Y%m%d-%H%M%S)
          echo "container_name=${container_name}" >> ${{ github.env }}
          docker run --network host --privileged --cap-add=ALL --pid=host --shm-size=128G -d -t --name ${container_name} \
            -v /usr/src:/usr/src \
            -v /lib/modules:/lib/modules \
            -v /dev:/dev \
            -v /home:/home \
            -v /data:/data \
            -v ${{ github.workspace }}/PaddleCustomDevice:/paddle \
            -e LD_LIBRARY_PATH=/usr/local/corex/lib \
            -e LIBRARY_PATH=/usr/local/corex/lib \
            -v /root/.cache:/root/.cache \
            -v /root/.cache:/root/.ccache \
            -e BRANCH \
            -e PR_ID \
            -e COMMIT_ID \
            -e work_dir \
            -e PADDLE_ROOT \
            -e PADDLE_VERSION \
            -e WITH_COVERAGE \
            -e GITHUB_API_TOKEN \
            -e AGILE_PULL_ID \
            -e AGILE_REVISION \
            -e GIT_PR_ID \
            -e PYTHON_VERSION \
            -e PYTHONPATH= \
            -e no_proxy \
            -e PADDLE_BRANCH \
            -e CI_name \
            -w /paddle ${docker_image} /bin/bash

      - name: Install Paddle-CPU
        if: steps.check-approval.outputs.can-skip != 'true'
        run: |
          docker exec -t ${{ env.container_name }} /bin/bash -c '
          set -x
          source ~/.bashrc
          source /root/miniconda3/etc/profile.d/conda.sh
          conda activate base
          export LD_LIBRARY_PATH="$CONDA_PREFIX/lib:$LD_LIBRARY_PATH"
          unset PYTHONPATH
          #wget -q https://sys-p0.bj.bcebos.com/libstdc%2B%2B6_13.1.0-8ubuntu1_20.04.2_amd64.deb
          #dpkg -i *deb
          wget -q --no-proxy https://paddle-github-action.bj.bcebos.com/PR/cpu_whl/${PR_ID}/${COMMIT_ID}/paddlepaddle-0.0.0-cp39-cp39-linux_x86_64.whl --no-check-certificate
          echo "::group::Install Paddle"
          pip install paddlepaddle-*.whl && rm -rf paddlepaddle-*.whl
          python -c "import paddle; print(paddle.__version__)"
          python -c "import paddle; print(paddle.version.commit)"
          echo "::endgroup::"
          '

      - name: Build and test
        if: steps.check-approval.outputs.can-skip != 'true'
        run: |
          docker exec -t ${{ env.container_name }} /bin/bash -c '
          source ~/.bashrc
          source /root/miniconda3/etc/profile.d/conda.sh
          conda activate
          export LD_LIBRARY_PATH="$CONDA_PREFIX/lib:$LD_LIBRARY_PATH"
          unset PYTHONPATH
          set -x
          set -euo pipefail

          trap '\''{
            ret=$?
            echo "============================================================"
            echo "IXUCA CI TEST FAILED"
            echo "Please contact the following maintainers for help:"
            echo "  - YqGe585"
            echo "  - yongqiangma"
            echo "============================================================"
            exit $ret
          }'\'' ERR

          retry_or_skip() {
            if "$@"; then
              return 0
            fi
            echo "WARN: command failed, retrying in 20s: $*"
            sleep 20
            if "$@"; then
              return 0
            fi
            echo "WARN: command failed again, skip install: $*"
            return 0
          }

          echo "::group::Install dependencies"
          retry_or_skip python -m pip install PyGithub
          retry_or_skip python -m pip install wheel
          echo "::endgroup::"
          retry_or_skip pip install -U numpy==1.26.4
          git config --global --add safe.directory ${work_dir}
          git config --global --add safe.directory ${work_dir}/Paddle
          pwd
          ls
          cd Paddle
          git config --global --add safe.directory "*"
          cd ..
          cd backends/iluvatar_gpu/
          bash build_paddle.sh
          pip install build_pip/paddle_iluvatar_gpu*.whl
          cd tests/
          export FLAG_SKIP_FLOAT64=1
          bash run_test.sh
          '

      - name: Terminate and delete the container
        if: ${{ always() && steps.check-approval.outputs.can-skip != 'true' }}
        run: |
          docker exec -t ${{ env.container_name }} /bin/bash -c 'rm -rf * .[^.]*'
          docker stop ${{ env.container_name }}
          docker rm ${{ env.container_name }}
