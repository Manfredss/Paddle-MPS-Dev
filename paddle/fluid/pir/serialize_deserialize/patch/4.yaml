op_patches:
  - op_name : pd_op.leaky_relu
    actions:
      - action : modify_attr
        object : negative_slope
        type : pir::DoubleAttribute
  - op_name : pd_op.softplus
    actions:
      - action : modify_attr
        object : beta
        type : pir::DoubleAttribute
      - action : modify_attr
        object : threshold
        type : pir::DoubleAttribute
  - op_name : onednn_op.fused_softplus
    actions:
      - action : modify_attr
        object : beta
        type : pir::DoubleAttribute
      - action : modify_attr
        object : threshold
        type : pir::DoubleAttribute
      - action : modify_attr
        object : fuse_alpha
        type : pir::DoubleAttribute
      - action : modify_attr
        object : fuse_beta
        type : pir::DoubleAttribute
  - op_name : pd_op.logit
    actions:
      - action : modify_attr
        object : eps
        type : pir::DoubleAttribute
  - op_name : pd_op.pad3d
    actions:
      - action : modify_attr
        object : pad_value
        type : pir::DoubleAttribute
  - op_name : pd_op.group_norm
    actions:
      - action : modify_attr
        object : epsilon
        type : pir::DoubleAttribute
  - op_name : pd_op.add_group_norm_silu
    actions:
      - action : modify_attr
        object : epsilon
        type : pir::DoubleAttribute
  - op_name : pd_op.group_norm_silu_xpu
    actions:
      - action : modify_attr
        object : epsilon
        type : pir::DoubleAttribute
  - op_name : pd_op.top_p_sampling
    actions:
      - action : modify_attr
        object : seed
        type : pir::Int64Attribute
  - op_name : pd_op.bicubic_interp
    actions:
      - action : modify_attr
        object : scale
        type : pir::ArrayAttribute
        data :
          - type: pir::DoubleAttribute
          - type: pir::DoubleAttribute
  - op_name : pd_op.nearest_interp
    actions:
      - action : modify_attr
        object : scale
        type : pir::ArrayAttribute
        data :
          - type: pir::DoubleAttribute
          - type: pir::DoubleAttribute
          - type: pir::DoubleAttribute
  - op_name : pd_op.linear_interp
    actions:
      - action : modify_attr
        object : scale
        type : pir::ArrayAttribute
        data :
          - type: pir::DoubleAttribute
  - op_name : pd_op.bilinear_interp
    actions:
      - action : modify_attr
        object : scale
        type : pir::ArrayAttribute
        data :
          - type: pir::DoubleAttribute
          - type: pir::DoubleAttribute
  - op_name : pd_op.trilinear_interp
    actions:
      - action : modify_attr
        object : scale
        type : pir::ArrayAttribute
        data :
          - type: pir::DoubleAttribute
          - type: pir::DoubleAttribute
          - type: pir::DoubleAttribute
  - op_name : pd_op.moe_permute
    actions:
      - action : add_attr
        object : using_ue8m0_scale
        type : pir::BoolAttribute
        data : "false"
      - action : add_attr
        object : return_expert_indices
        type : pir::BoolAttribute
        data : "false"
      - action : add_attr
        object : override_buffer_size
        type : pir::Int32Attribute
        data : -1
  - op_name : pd_op.moe_unpermute
    actions:
      - action : add_attr
        object : using_ue8m0_scale
        type : pir::BoolAttribute
        data : "false"
      - action : add_attr
        object : using_weighted_combine
        type : pir::BoolAttribute
        data : "false"
  - op_name : pd_op.p_norm
    actions :
      - action : modify_attr
        object : porder
        type : pir::DoubleAttribute
        data : 2
  - op_name : pd_op.p_norm_grad
    actions :
      - action : modify_attr
        object : porder
        type : pir::DoubleAttribute
        data : 2
